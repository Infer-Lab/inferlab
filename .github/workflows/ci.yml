name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo build --workspace
      - run: cargo test --workspace --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # protocol-check regenerates the adapter schema through cargo; the
      # toolchain is an explicit input, not an ambient runner fact.
      - uses: dtolnay/rust-toolchain@1.89.0
      - uses: Swatinem/rust-cache@v2
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - run: pixi run verify-python

  website:
    name: Website
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          cache: true
      - run: pixi run -e website website-install
      - run: pixi run -e website website-verify
      - if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy-pages:
    name: Deploy GitHub Pages
    if: github.event_name == 'push'
    needs: [rust, python, website]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the validated public snapshot
        id: deployment
        uses: actions/deploy-pages@v5
