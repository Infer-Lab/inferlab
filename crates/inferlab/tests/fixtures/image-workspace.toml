schema_version = 2

[models.dsv4]
served_name = "dsv4"

[models.dsv4b]
served_name = "dsv4b"

[stacks.vllm]
integration = "vllm"
pixi_environment = "vllm"
source_paths = ["vendor/vllm", "vendor/flashinfer"]

[[stacks.vllm.checks]]
id = "fixture-guard"
script = "tools/fixture-check.py"
repair_hint = "pixi run fixture-repair"

[[stacks.vllm.image_postprocess]]
id = "fixture-finish"
script = "tools/fixture-finish.py"

[stacks.vllm-alt]
integration = "vllm"
pixi_environment = "vllm"
source_paths = ["vendor/vllm", "vendor/flashinfer"]

[stacks.flashinfer-only]
integration = "vllm"
pixi_environment = "vllm"
source_paths = ["vendor/flashinfer"]

[servers.dsv4-qualify]
stack = "vllm"
model = "dsv4"
topology = "single"
readiness_timeout_seconds = 60
default_case = "base"

[servers.dsv4-qualify.roles.serve]

[servers.dsv4-qualify.cases.base]

[servers.dsv4b-qualify]
stack = "vllm"
model = "dsv4b"
topology = "single"
readiness_timeout_seconds = 60
default_case = "base"

[servers.dsv4b-qualify.roles.serve]

[servers.dsv4b-qualify.cases.base]

[servers.dsv4-qualify-alt-env]
stack = "vllm-alt"
model = "dsv4"
topology = "single"
readiness_timeout_seconds = 60
default_case = "base"

[servers.dsv4-qualify-alt-env.roles.serve]

[servers.dsv4-qualify-alt-env.cases.base]

[servers.dsv4-qualify-alt-sources]
stack = "flashinfer-only"
model = "dsv4"
topology = "single"
readiness_timeout_seconds = 60
default_case = "base"

[servers.dsv4-qualify-alt-sources.roles.serve]

[servers.dsv4-qualify-alt-sources.cases.base]

[servers.dsv4-pair]
stack = "vllm"
model = "dsv4"
topology = "single"
readiness_timeout_seconds = 60
default_case = "pair"

[servers.dsv4-pair.roles.serve]

[servers.dsv4-pair.cases.pair.roles.serve]
replicas = 2

[evals.smoke]
kind = "openai-smoke"
prompt = "San Francisco is a city in"
max_tokens = 16
timeout_seconds = 60

[benches.probe]
kind = "serving"
input_tokens = 128
output_tokens = 16
concurrency = [1]
prompts_per_concurrency = 1
request_rates = [1.0]
request_count = 4
burstiness = 1.0
reset_prefix_cache = false
timeout_seconds = 60

[workload_suites.smoke-only]
evals = ["smoke"]
gate = "smoke"

[recipes.dsv4-qualify]
server = "dsv4-qualify"
workload_suite = "smoke-only"

[recipes.dsv4b-qualify]
server = "dsv4b-qualify"
workload_suite = "smoke-only"

[recipes.dsv4-qualify-alt-env]
server = "dsv4-qualify-alt-env"
workload_suite = "smoke-only"

[recipes.dsv4-qualify-alt-sources]
server = "dsv4-qualify-alt-sources"
workload_suite = "smoke-only"

[recipes.dsv4-pair]
server = "dsv4-pair"
workload_suite = "smoke-only"

[images.dsv4-runtime]
stack = "vllm"
base_image = "example.com/micromamba:1.0"
platforms = ["linux/amd64", "linux/arm64"]
packages = ["vendor/vllm", "vendor/flashinfer"]

[[images.dsv4-runtime.validations]]
recipe = "dsv4-qualify"

[[images.dsv4-runtime.validations]]
recipe = "dsv4b-qualify"

[images.dsv4-runtime-foreign]
stack = "vllm"
base_image = "example.com/micromamba:1.0"
platforms = ["linux/arm64"]

[images.dsv4-runtime-native]
stack = "vllm"
base_image = "example.com/micromamba:1.0"
platforms = ["linux/amd64"]

[[images.dsv4-runtime-native.validations]]
recipe = "dsv4-qualify"

[[images.dsv4-runtime-native.validations]]
recipe = "dsv4b-qualify"

[images.dsv4-runtime-bare]
stack = "vllm"
base_image = "example.com/micromamba:1.0"
platforms = ["linux/amd64"]

[external_images.fixture-external]
reference = "example.com/fixture-vllm@sha256:abababababababababababababababababababababababababababababababab"
integration = "vllm"

[external_images.fixture-foreign-stack]
reference = "example.com/fixture-sglang@sha256:cdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcdcd"
integration = "sglang"
